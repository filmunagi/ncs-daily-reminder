name: Daily NCS Reminder

on:
  schedule:
    # KST 13:00 = UTC 04:00
    - cron: '0 4 * * *'
    # KST 16:00 = UTC 07:00
    - cron: '0 7 * * *'
    # KST 19:00 = UTC 10:00
    - cron: '0 10 * * *'
    # KST 21:00 = UTC 12:00
    - cron: '0 12 * * *'
  workflow_dispatch: {}   # 수동 실행용 버튼

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Check attendance and send reminder if needed
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SYNC_CODE: ${{ secrets.SYNC_CODE }}
          APP_URL: https://artleebk.netlify.app
        run: python send_reminder.py
